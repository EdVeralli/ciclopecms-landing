<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar email · Cíclope CMS</title>
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f0f7f5; color:#111827; margin:0; display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .card { background:#fff; border:1px solid #cfe2dd; border-radius:16px; padding:48px 40px; max-width:440px; text-align:center; box-shadow:0 12px 32px rgba(0,0,0,.08); }
  .icon { font-size:54px; line-height:1; margin-bottom:12px; }
  h1 { color:#065f46; font-size:22px; margin:0 0 8px; }
  p { color:#4a5450; font-size:15px; margin:0 0 8px; }
  a.btn { display:inline-block; margin-top:20px; background:#2bb696; color:#fff; text-decoration:none; padding:12px 24px; border-radius:8px; font-weight:700; }
  .muted { color:#9ca3af; font-size:13px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="titulo">Verificando…</h1>
    <p id="msg">Un momento, estamos confirmando tu email.</p>
  </div>
<script>
  const API = "https://demo.ciclopecms.com/api";
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const icon = document.getElementById('icon');
  const titulo = document.getElementById('titulo');
  const msg = document.getElementById('msg');
  const card = document.getElementById('card');
  function ok(email){
    icon.textContent = '✅';
    titulo.textContent = '¡Email verificado!';
    msg.innerHTML = 'Confirmaste <b>' + (email||'') + '</b>. Ya podés cerrar esta página.';
    card.insertAdjacentHTML('beforeend', '<a class="btn" href="https://ciclopecms.com/">Volver al inicio</a>');
  }
  function fail(t){
    icon.textContent = '⚠️';
    titulo.textContent = 'No se pudo verificar';
    msg.textContent = t || 'El enlace es inválido o ya fue utilizado.';
    card.insertAdjacentHTML('beforeend', '<p class="muted">Si ya verificaste antes, está todo bien.</p>');
  }
  if (!token) { fail('Falta el código de verificación en el enlace.'); }
  else {
    fetch(API + '/v1/public/verificar?token=' + encodeURIComponent(token))
      .then(async r => {
        const data = await r.json().catch(() => ({}));
        if (r.ok) ok(data.email); else fail(data.detail || 'El enlace es inválido o ya fue utilizado.');
      })
      .catch(() => fail('Error de conexión. Reintentá en un momento.'));
  }
</script>
</body>
</html>
